# frontend/nginx.conf
# Конфигурация Nginx с увеличенным лимитом загрузки

server {
    listen 80;
    server_name localhost;
    
    # ← ДОБАВЛЕНО: увеличиваем максимальный размер тела запроса до 20 МБ
    client_max_body_size 20M;
    
    # Корневая папка со статикой
    root /usr/share/nginx/html;
    index index.html;
    
    # Главная страница
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Проксирование API на бэкенд
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        
        # ← ДОБАВЛЕНО: увеличиваем таймауты для больших файлов
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # ← ДОБАВЛЕНО: разрешаем большие заголовки (для base64)
        proxy_buffering off;
        proxy_request_buffering off;
    }
    
    # Кэширование статики
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}